<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>API Reference</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        height: 100%;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-yaml"></script>
  </head>
  <body>
    <div id="app"></div>
    <script>
      (async function () {
        const url = new URL(document.location.href);
        const specUrl = url.searchParams.get('url');
        const spec = await fetch(specUrl).then(x => x.text());
        console.info('Spec Loaded', spec);
        // const serverUrl = url.searchParams.get('server');
        
        Scalar.createApiReference("#app", {
          // url: specUrl,
          content: spec,
          theme: "default",
          layout: "modern",
          showSidebar: true,
        });
      })();
    </script>
  </body>
</html>
